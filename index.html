<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Endless Runner</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="game">

    <!-- HUD -->
    <div id="hud">

        <div id="score">
            Score : 0
        </div>

        <div id="distance">
            Distance : 0 m
        </div>

    </div>

    <!-- Game Over -->
    <div id="gameOver">

        <h1>GAME OVER</h1>

        <p id="finalScore">
            Score : 0
        </p>

        <button id="restartBtn">
            Restart
        </button>

    </div>

</div>

<script type="module">

/* ===========================
   THREE.JS
=========================== */

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.179.1/build/three.module.js";

window.THREE = THREE;

/* ===========================
   GAME CORE
=========================== */

import "./config.js";

import "./scene.js";

import "./road.js";

import "./city.js";

import "./player.js";

import "./controls.js";

import "./objects.js";

import "./collision.js";

import "./score.js";

import "./utils.js";

import "./main.js";

</script>

</body>

</html>
